services:
  api:
    build: .
    container_name: procesador-archivos-tabulares
    restart: unless-stopped
    ports:
      - "${PORT:-8010}:8010"
    environment:
      - PORT=8010
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEFAULT_CHUNK_SIZE=${DEFAULT_CHUNK_SIZE:-5000}
      - MAX_CONTENT_LENGTH_MB=${MAX_CONTENT_LENGTH_MB:-50}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
